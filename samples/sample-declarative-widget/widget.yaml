id: sample.declarative.metrics
title: Sample Metrics
description: Command-backed declarative widget sample
category: information
apiVersion: 1
template: list
preferredSpan: 1
refresh: 30s
source:
  type: command
  command:
    - python
    - fetch.py
  timeout: 5s
bindings:
  items: $.metrics[*]
  item.label: $.label
  item.value: $.value
  item.trend: $.trend
